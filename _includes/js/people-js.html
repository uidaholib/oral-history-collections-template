<script>
/**
 * PEOPLE PAGE JAVASCRIPT
 * Handles filtering, search, and display of narrator list
 */

// =============================================================================
// INITIALIZATION
// =============================================================================

let filteredPeople = peopleData;
const searchBox = document.getElementById('peopleSearchBox');
const peopleGrid = document.getElementById('peopleGrid');
const resultsCount = document.getElementById('searchResultsCount');
const occupationList = document.getElementById('occupationList');
const residenceList = document.getElementById('residenceList');

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    displayPeople(peopleData);
    updateResultsCount(peopleData.length);
    buildOccupationSidebar();
    buildResidenceSidebar();
    
    // Setup search with debounce
    let searchTimeout;
    searchBox.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            filterPeople(this.value);
        }, 300);
    });
    
    // Focus search box
    searchBox.focus();
});

// =============================================================================
// OCCUPATION SIDEBAR
// =============================================================================

/**
 * Build the occupation sidebar with top occupations
 */
function buildOccupationSidebar() {
    if (!occupationList) return; // Sidebar not present on mobile
    
    // Count occupations (normalize case for counting)
    const occupationCounts = {};
    const occupationDisplayNames = {}; // Store the most common casing
    
    peopleData.forEach(person => {
        if (person.occupation) {
            // Split by semicolon for multiple occupations
            const occupations = person.occupation.split(';').map(o => o.trim()).filter(o => o);
            occupations.forEach(occ => {
                const normalized = occ.toLowerCase();
                occupationCounts[normalized] = (occupationCounts[normalized] || 0) + 1;
                
                // Keep the version with more capitals for display (looks more professional)
                if (!occupationDisplayNames[normalized] || occ.charAt(0) === occ.charAt(0).toUpperCase()) {
                    occupationDisplayNames[normalized] = occ;
                }
            });
        }
    });
    
    // Sort by count and get top 30
    const topOccupations = Object.entries(occupationCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 30);
    
    // Build the list
    let html = '<div class="list-group list-group-flush">';
    topOccupations.forEach(([normalized, count]) => {
        const displayName = occupationDisplayNames[normalized];
        html += `<button type="button" class="list-group-item list-group-item-action occupation-filter-btn" 
                        data-occupation="${normalized}" 
                        onclick="filterByOccupation('${normalized.replace(/'/g, "\\'")}')"
                        title="Show ${count} narrator${count > 1 ? 's' : ''}">
                    <span class="occupation-name">${displayName}</span>
                    <span class="badge bg-secondary float-end">${count}</span>
                 </button>`;
    });
    html += '</div>';
    
    occupationList.innerHTML = html;
}

/**
 * Filter by clicking an occupation in sidebar
 */
function filterByOccupation(occupation) {
    searchBox.value = occupation;
    filterPeople(occupation);
    
    // Highlight the active occupation
    document.querySelectorAll('.occupation-filter-btn').forEach(btn => {
        if (btn.dataset.occupation === occupation) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    
    // Remove active state from residence buttons
    document.querySelectorAll('.residence-filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Scroll to top of results
    peopleGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// =============================================================================
// RESIDENCE SIDEBAR
// =============================================================================

/**
 * Build the residence sidebar with top residences
 */
function buildResidenceSidebar() {
    if (!residenceList) return; // Sidebar not present on mobile
    
    // Count residences (normalize case for counting)
    const residenceCounts = {};
    const residenceDisplayNames = {}; // Store the most common casing
    
    peopleData.forEach(person => {
        if (person.residence) {
            // Split by semicolon for multiple residences
            const residences = person.residence.split(';').map(r => r.trim()).filter(r => r);
            residences.forEach(res => {
                const normalized = res.toLowerCase();
                residenceCounts[normalized] = (residenceCounts[normalized] || 0) + 1;
                
                // Keep the version with more capitals for display (looks more professional)
                if (!residenceDisplayNames[normalized] || res.charAt(0) === res.charAt(0).toUpperCase()) {
                    residenceDisplayNames[normalized] = res;
                }
            });
        }
    });
    
    // Sort by count and get top 30
    const topResidences = Object.entries(residenceCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 30);
    
    // Build the list
    let html = '<div class="list-group list-group-flush">';
    topResidences.forEach(([normalized, count]) => {
        const displayName = residenceDisplayNames[normalized];
        html += `<button type="button" class="list-group-item list-group-item-action residence-filter-btn" 
                        data-residence="${normalized}" 
                        onclick="filterByResidence('${normalized.replace(/'/g, "\\'")}')"
                        title="Show ${count} narrator${count > 1 ? 's' : ''}">
                    <span class="residence-name">${displayName}</span>
                    <span class="badge bg-secondary float-end">${count}</span>
                 </button>`;
    });
    html += '</div>';
    
    residenceList.innerHTML = html;
}

/**
 * Filter by clicking a residence in sidebar
 */
function filterByResidence(residence) {
    searchBox.value = residence;
    filterPeople(residence);
    
    // Highlight the active residence
    document.querySelectorAll('.residence-filter-btn').forEach(btn => {
        if (btn.dataset.residence === residence) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    
    // Remove active state from occupation buttons
    document.querySelectorAll('.occupation-filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Scroll to top of results
    peopleGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// =============================================================================
// FILTERING & SEARCH
// =============================================================================

/**
 * Filter people based on search query
 */
function filterPeople(query) {
    if (!query || query.trim() === '') {
        filteredPeople = peopleData;
    } else {
        const searchTerms = query.toLowerCase().trim();
        filteredPeople = peopleData.filter(person => {
            return (
                (person.name && person.name.toLowerCase().includes(searchTerms)) ||
                (person.occupation && person.occupation.toLowerCase().includes(searchTerms)) ||
                (person.residence && person.residence.toLowerCase().includes(searchTerms)) ||
                (person.origin && person.origin.toLowerCase().includes(searchTerms))
            );
        });
    }
    
    displayPeople(filteredPeople);
    updateResultsCount(filteredPeople.length);
}

/**
 * Clear search and reset display
 */
function clearPeopleSearch() {
    searchBox.value = '';
    filterPeople('');
    searchBox.focus();
    
    // Remove active state from occupation buttons
    document.querySelectorAll('.occupation-filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Remove active state from residence buttons
    document.querySelectorAll('.residence-filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
}

/**
 * Update results count display
 */
function updateResultsCount(count) {
    if (searchBox.value.trim() === '') {
        resultsCount.textContent = `Showing all ${count} narrators`;
    } else {
        resultsCount.textContent = `Found ${count} narrator${count !== 1 ? 's' : ''}`;
    }
}

// =============================================================================
// DISPLAY
// =============================================================================

/**
 * Display people cards in grid
 */
function displayPeople(people) {
    if (people.length === 0) {
        peopleGrid.innerHTML = '<div class="col-12 text-center py-5"><p class="lead text-muted">No narrators found matching your search.</p></div>';
        return;
    }
    
    peopleGrid.innerHTML = people.map(person => createPersonCard(person)).join('');
}

/**
 * Create HTML card for a person
 */
function createPersonCard(person) {
    const hasImage = person.image_small || person.image_thumb;
    const imageUrl = person.image_small || person.image_thumb;
    const interviewText = person.interview_count ? 
        `${person.interview_count} interview${person.interview_count > 1 ? 's' : ''}` : 
        'Interviews available';
    
    let card = '<div class="col-lg-4 col-md-6 col-6 mb-4">';
    card += '<div class="card h-100 person-card">';
    
    // Image or placeholder
    if (hasImage) {
        card += `<a href="${person.person_link}">`;
        card += `<img src="${imageUrl}" class="card-img-top person-card-img" alt="${person.name}">`;
        card += '</a>';
    } else {
        const lastName = getLastName(person.title);
        let lengthClass = '';
        if (lastName.length > 15) lengthClass = 'extra-long';
        else if (lastName.length > 11) lengthClass = 'very-long';
        else if (lastName.length > 8) lengthClass = 'long';
        else if (lastName.length > 6) lengthClass = 'medium';
        
        card += '<div class="person-card-placeholder">';
        card += `<div class="person-initials" data-length="${lengthClass}">${lastName}</div>`;
        card += '</div>';
    }
    
    // Card body
    card += '<div class="card-body">';
    card += `<h3 class="card-title h5"><a href="${person.person_link}" class="stretched-link">${person.title}</a></h3>`;
    
    if (person.birth_year) {
        card += `<p class="text-muted small mb-2">Born ${person.birth_year}</p>`;
    }
    
    if (person.occupation) {
        card += `<p class="card-text small"><strong>Occupation:</strong> ${person.occupation}</p>`;
    }
    
    if (person.residence) {
        card += `<p class="card-text small"><strong>Residence:</strong> ${person.residence}</p>`;
    }
    
    card += '</div>'; // card-body
    
    // Card footer
    card += '<div class="card-footer bg-transparent">';
    card += `<small class="text-muted">${interviewText}</small>`;
    card += '</div>';
    
    card += '</div>'; // card
    card += '</div>'; // col
    
    return card;
}

/**
 * Get last name from title for placeholder
 */
function getLastName(title) {
    if (!title) return '?';
    
    // Get the last word from the title
    const words = title.trim().split(/\s+/);
    return words[words.length - 1].toUpperCase();
}
</script>
